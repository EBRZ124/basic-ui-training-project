<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<style>
    nav { background: #f1f5f9; padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; text-decoration: none; color: #2563eb; }
    nav a:hover { text-decoration: underline; }
</style>
<body>

<nav th:fragment="nav">
    <a href="/">Home</a>
    <a href="/animals">All animals</a>
    <a href="/animals/new">Add animal</a>

    <a th:if="${#authorization.expression('!isAuthenticated()')}" href="/login">Log in</a>

    <span sec:authorize="isAuthenticated()">
        Logged in as <span sec:authentication="name">username</span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit">Log out</button>
        </form>
    </span>

</nav>

</body>
</html>
